<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — AdSync Pro</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,102,255,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-container { width: 100%; max-width: 420px; position: relative; }

    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-secondary); text-decoration: none; font-size: 13px;
      margin-bottom: 32px; transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    .logo-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .logo-icon {
      width: 36px; height: 36px; background: var(--blue);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 17px; box-shadow: 0 0 20px rgba(0,102,255,0.5);
    }
    .logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 800; }
    .logo-text span { color: var(--gold); }

    .auth-title { font-family: var(--font-display); font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .auth-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; line-height: 1.6; }

    .form-group { margin-bottom: 18px; }
    .btn-full { width: 100%; justify-content: center; padding: 15px; font-size: 15px; border-radius: var(--radius); }

    .error-msg { background: var(--danger-bg); border: 1px solid rgba(255,68,102,0.3); border-radius: var(--radius); padding: 12px 16px; color: var(--danger); font-size: 13px; margin-bottom: 16px; display: none; }
    .success-msg { background: var(--success-bg); border: 1px solid rgba(0,255,136,0.3); border-radius: var(--radius); padding: 12px 16px; color: var(--success); font-size: 13px; margin-bottom: 16px; display: none; }

    .auth-switch { text-align: center; font-size: 14px; color: var(--text-secondary); margin-top: 20px; }
    .auth-switch a { color: var(--blue-bright); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

<div class="auth-container">
  <a href="login.html" class="back-link">← Back to Sign In</a>

  <div class="logo-wrap">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">AdSync <span>Pro</span></span>
  </div>

  <div class="auth-title">Reset your password</div>
  <div class="auth-sub">Enter your email address and we'll send you a link to reset your password.</div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <div class="form-group">
    <label class="label">Email Address</label>
    <input type="email" class="input" id="email" placeholder="you@example.com" />
  </div>

  <button class="btn-primary btn-full" onclick="handleReset()" id="reset-btn">
    Send Reset Link →
  </button>

  <div class="auth-switch">
    Remembered your password? <a href="login.html">Sign in</a>
  </div>
</div>

<script>
  const API = 'https://adsync-pro-backend-production.up.railway.app';

  async function handleReset() {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('reset-btn');
    const err = document.getElementById('error-msg');
    const suc = document.getElementById('success-msg');

    err.style.display = 'none'; suc.style.display = 'none';
    if (!email) { err.textContent = 'Please enter your email address.'; err.style.display = 'block'; return; }

    btn.textContent = 'Sending...'; btn.disabled = true;

    try {
      const res = await fetch(`${API}/api/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      suc.textContent = '✅ If that email exists, a reset link has been sent. Check your inbox!';
      suc.style.display = 'block';
      btn.textContent = 'Email Sent ✓';
    } catch (e) {
      err.textContent = 'Something went wrong. Please try again.'; err.style.display = 'block';
      btn.textContent = 'Send Reset Link →'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
